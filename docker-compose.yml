version: '3.8'

services:
  diva-mysql:
    image: mariadb:10.6
    container_name: diva-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: diva_root_secure_pass_123
      MYSQL_DATABASE: db_diva
      MYSQL_USER: diva_user
      MYSQL_PASSWORD: diva_password_secure_456
    volumes:
      - diva_mysql_data:/var/lib/mysql

  diva-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diva-app
    restart: unless-stopped
    environment:
      DB_HOST: diva-mysql
      DB_USER: diva_user
      DB_PASS: diva_password_secure_456
      DB_NAME: db_diva
      DB_PASSWORD: diva_password_secure_456
      DB_DATABASE: db_diva
    depends_on:
      - diva-mysql

volumes:
  diva_mysql_data:

networks:
  default:
    name: pba-new_default
    external: true
